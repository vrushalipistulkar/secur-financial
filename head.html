<!-- Adobe Experience Platform Launch - Secur Financial -->
<script>
  (function loadLaunchFromPlaceholders() {
    const DEFAULT_LAUNCH_URL = 'https://assets.adobedtm.com/59610d662d36/82eac5077dd7/launch-0a81dcb5aa51-development.min.js';
    const PLACEHOLDERS_URL = '/placeholders.json';

    const toCamelCase = (key) => String(key || '')
      .toLowerCase()
      .replace(/[^a-z0-9]+(.)/g, (_, chr) => (chr ? chr.toUpperCase() : ''));

    const appendLaunchScript = (src) => {
      console.info('[launch] Appending Launch script:', src);
      const script = document.createElement('script');
      script.src = src;
      script.async = true;
      document.head.appendChild(script);
    };

    const pickLaunchUrl = (placeholders) => placeholders.launch || DEFAULT_LAUNCH_URL;

    console.info('[launch] Fetching placeholders for Launch URL from:', PLACEHOLDERS_URL);
    fetch(PLACEHOLDERS_URL, { credentials: 'same-origin' })
      .then((response) => (response.ok ? response.json() : Promise.reject(new Error(`HTTP ${response.status}`))))
      .then((json) => {
        const placeholders = {};
        (json?.data || [])
          .filter((row) => row && row.Key)
          .forEach((row) => {
            placeholders[toCamelCase(row.Key)] = row.Text;
          });
        console.info('[launch] Placeholder "launch" value:', placeholders.launch);
        console.info('[launch] Launch URL source:', placeholders.launch ? 'placeholder.launch' : 'default');
        appendLaunchScript(pickLaunchUrl(placeholders));
      })
      .catch((error) => {
        console.warn('[launch] Failed to fetch placeholders. Using default Launch URL.', error);
        appendLaunchScript(DEFAULT_LAUNCH_URL);
      });
  }());
</script>
